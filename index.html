<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Sudoku - 現代經典數獨</title>
    <meta name="description" content="一個現代、美觀且具備進階功能的數獨遊戲。支援復原、數字追蹤與錯誤提示。">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header>
            <h1>SUDOKU</h1>
            <div class="status-bar">
                <div class="status-item">
                    <span class="label">難度:</span>
                    <select id="difficulty-select" class="glass-select">
                        <option value="easy">簡單</option>
                        <option value="medium" selected>中等</option>
                        <option value="hard">困難</option>
                    </select>
                </div>
                <div class="status-item timer-container">
                    <span class="label">時間:</span>
                    <div class="timer-row">
                        <span id="timer-display">00:00</span>
                        <button id="pause-btn" class="icon-btn" title="暫停/繼續">
                            <svg id="pause-icon" viewBox="0 0 24 24" width="20" height="20">
                                <path fill="currentColor" d="M14,19H18V5H14M6,19H10V5H6V19Z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="status-item">
                    <span class="label">模式:</span>
                    <button id="theme-btn" class="icon-btn" title="切換深淺模式">
                        <svg id="theme-icon" viewBox="0 0 24 24" width="20" height="20">
                            <!-- Moon icon for dark mode (to switch to light) -->
                            <path fill="currentColor"
                                d="M12,18C11.11,18 10.26,17.8 9.5,17.45C11.56,16.5 13,14.42 13,12C13,9.58 11.56,7.5 9.5,6.55C10.26,6.2 11.11,6 12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18M20,8.69V4H15.31L12,0.69L8.69,4H4V8.69L0.69,12L4,15.31V20H8.69L12,23.31L15.31,20H20V15.31L23.31,12L20,8.69Z" />
                        </svg>
                    </button>
                </div>
                <div class="status-item clickable-status" id="profile-btn" role="button" tabindex="0" title="查看成長記錄層">
                    <span class="label">等級</span>
                    <span id="profile-btn-text">🌱 見習者</span>
                </div>
            </div>
        </header>

        <section class="game-area">
            <div id="sudoku-container" class="sudoku-container">
                <div id="sudoku-grid" class="sudoku-grid">
                    <!-- 81 cells -->
                </div>
                <div id="pause-overlay" class="pause-overlay hidden">
                </div>
            </div>

            <div class="controls-side">
                <div class="numpad" id="numpad">
                    <!-- Buttons 1-9 -->
                </div>
                <div class="action-buttons">
                    <button id="note-btn" title="筆記模式 (N)">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor"
                                d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z" />
                        </svg>
                        <span>筆記</span>
                    </button>
                    <button id="undo-btn" title="復原 (Undo)">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor"
                                d="M12.5,8C9.85,8 7.45,9 5.6,10.6L2,7V16H11L7.38,12.38C8.77,11.22 10.54,10.5 12.5,10.5C16.04,10.5 19.05,12.81 20.1,16L22.47,15.22C21.08,11.03 17.15,8 12.5,8Z" />
                        </svg>
                        <span>復原</span>
                    </button>
                    <button id="hint-btn" title="提示 (Hint)">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor"
                                d="M12,2A7,7 0 0,0 5,9C5,11.38 6.19,13.47 8,14.74V17A1,1 0 0,0 9,18H15A1,1 0 0,0 16,17V14.74C17.81,13.47 19,11.38 19,9A7,7 0 0,0 12,2M9,21A1,1 0 0,0 10,22H14A1,1 0 0,0 15,21V20H9V21Z" />
                        </svg>
                        <span>提示</span>
                    </button>
                    <button id="new-game-btn" title="新遊戲">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor"
                                d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z" />
                        </svg>
                        <span>新遊戲</span>
                    </button>
                </div>
            </div>
        </section>


        <!-- XP Result Card -->
        <div id="result-card" class="modal hidden">
            <div class="modal-content result-card-content glass">
                <div class="result-header">
                    <span class="result-check">✅</span>
                    <h2>完成！</h2>
                </div>

                <div class="result-level-row">
                    <span id="result-level-num" class="result-level-badge">Lv.1</span>
                    <span id="result-level-title" class="result-level-title">🌱 見習者</span>
                </div>

                <div id="result-time" class="result-badge">⏱️ 最終完成時間：00:00</div>
                <div id="result-levelup" class="result-badge levelup hidden"></div>

                <div class="result-xp-label">
                    <span id="result-xp" class="result-xp-earned">+0 XP</span>
                    <span class="result-streak">🔥 連勝 <span id="result-streak">1</span> 局</span>
                </div>

                <div class="result-xp-bar-track" id="result-xp-bar">
                    <div class="result-xp-bar-fill" id="result-xp-bar-fill"></div>
                </div>

                <div class="result-actions">
                    <button id="play-again-btn">再玩一次</button>
                    <button id="result-close-btn" class="secondary">關閉</button>
                </div>
            </div>
        </div>

        <!-- Profile Modal -->
        <div id="profile-modal" class="modal hidden">
            <div class="modal-content profile-modal-content glass">
                <button id="profile-close-btn" class="modal-close-btn">×</button>
                <h2 class="profile-title">📊 我的成長記錄</h2>

                <div class="profile-level-row">
                    <span id="profile-level-badge" class="result-level-badge">Lv.1</span>
                    <span id="profile-level-title" class="result-level-title">🌱 見習者</span>
                </div>

                <div class="profile-xp-bar-track">
                    <div class="result-xp-bar-fill" id="profile-xp-bar-fill"></div>
                </div>
                <p class="profile-xp-text"><span id="profile-total-xp">0</span> / <span id="profile-next-xp">200</span>
                    XP</p>

                <div class="profile-stats">
                    <div class="profile-stat"><span class="stat-label">總場次</span><span id="pstat-total">0</span></div>
                    <div class="profile-stat"><span class="stat-label">勝利</span><span id="pstat-wins">0</span></div>
                    <div class="profile-stat"><span class="stat-label">🔥 連勝</span><span id="pstat-streak">0</span>
                    </div>
                    <div class="profile-stat"><span class="stat-label">簡單紀錄</span><span id="pstat-easy">-</span></div>
                    <div class="profile-stat"><span class="stat-label">中等紀錄</span><span id="pstat-medium">-</span></div>
                    <div class="profile-stat"><span class="stat-label">困難紀錄</span><span id="pstat-hard">-</span></div>
                </div>

                <div class="profile-actions">
                    <button id="export-btn">💾 匹出進度</button>
                    <label for="import-file" class="btn-label secondary">📥 匯入進度</label>
                    <input id="import-file" type="file" accept=".json" style="display:none">
                </div>
                <p class="profile-hint">匯出為 .json 檔案，換機或清除眀覽器後可匯入還原</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
